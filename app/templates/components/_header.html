<header class="ft-header">
  <div class="ft-header-inner d-flex align-items-center justify-content-between gap-3">

    <!-- Brand -->
    <div class="ft-header-brand d-flex align-items-center gap-3">
      <button class="ft-hamburger d-lg-none" id="ftSidebarToggle" aria-label="Abrir menu">
        <i class="bi bi-list"></i>
      </button>

      <a href="/" class="ft-brand-link d-flex align-items-center gap-2 text-decoration-none">
        <span class="ft-brand-icon">
          <i class="bi bi-graph-up-arrow"></i>
        </span>
        <div class="ft-brand-text">
          <span class="ft-brand-name">FinTrack</span>
          <span class="ft-brand-tagline d-none d-sm-block">Sistema de Gerenciamento de Finanças</span>
        </div>
      </a>
    </div>

    <!-- User info + logout -->
    {% if user.is_authenticated %}
    <div class="ft-header-user d-flex align-items-center gap-3">
      <div class="ft-user-info d-none d-md-block">
        <span class="ft-user-greeting">Bem-vindo de volta,</span>
        <span class="ft-user-name">{{ user.get_full_name|default:user.username }}</span>
      </div>
      <div class="ft-user-avatar">
        {{ user.username|slice:":1"|upper }}
      </div>
      <form method="post" action="{% url 'logout' %}" style="margin:0;">
        {% csrf_token %}
        <button type="submit" class="ft-logout-btn">
          <i class="bi bi-box-arrow-right"></i>
          <span class="d-none d-sm-inline">Sair</span>
        </button>
      </form>
    </div>
    {% endif %}
  </div>
</header>

<style>
  .ft-header {
    position: sticky; top: 0; z-index: 1030;
    background: var(--ft-surface, #161920);
    border-bottom: 1px solid var(--ft-border, #242832);
    padding: 0 1.5rem; height: 60px;
    display: flex; align-items: center;
    box-shadow: 0 2px 20px rgba(0,0,0,.35);
  }
  .ft-header-inner { width: 100%; }

  .ft-hamburger {
    background: transparent; border: 1px solid var(--ft-border, #242832);
    color: var(--ft-text-sub, #8d94a6); border-radius: 8px;
    width: 36px; height: 36px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.1rem; cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  .ft-hamburger:hover {
    background: rgba(0,229,160,.08); border-color: var(--ft-accent, #00e5a0);
    color: var(--ft-accent, #00e5a0);
  }

  .ft-brand-icon {
    display: inline-flex; align-items: center; justify-content: center;
    width: 34px; height: 34px;
    background: linear-gradient(135deg, rgba(0,229,160,.2), rgba(61,139,255,.15));
    border: 1px solid rgba(0,229,160,.3); border-radius: 10px;
    color: var(--ft-accent, #00e5a0); font-size: 1rem;
  }
  .ft-brand-name {
    display: block; font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: 1.05rem; color: var(--ft-text, #e8eaf0);
    letter-spacing: -.4px; line-height: 1.1;
  }
  .ft-brand-tagline {
    display: block; font-family: 'IBM Plex Sans', sans-serif;
    font-size: .68rem; color: var(--ft-muted, #52596b); line-height: 1;
  }

  /* ── User ── */
  .ft-header-user { flex-shrink: 0; }

  .ft-user-info { text-align: right; line-height: 1.3; }
  .ft-user-greeting {
    display: block; font-family: 'IBM Plex Sans', sans-serif;
    font-size: .7rem; color: var(--ft-muted);
  }
  .ft-user-name {
    display: block; font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 700; font-size: .85rem; color: var(--ft-text);
  }

  .ft-user-avatar {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--ft-accent), #00b37a);
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Plus Jakarta Sans', sans-serif;
    font-weight: 800; font-size: .85rem; color: #0d0f14; flex-shrink: 0;
  }

  .ft-logout-btn {
    display: inline-flex; align-items: center; gap: .35rem;
    background: transparent; border: 1px solid var(--ft-border);
    color: var(--ft-text-sub); font-family: 'IBM Plex Sans', sans-serif;
    font-size: .8rem; font-weight: 500; border-radius: 8px;
    padding: .35rem .75rem; text-decoration: none;
    transition: all .2s; white-space: nowrap;
  }
  .ft-logout-btn:hover {
    border-color: #f55; color: #f55; background: rgba(255,68,68,.08);
  }
</style>
